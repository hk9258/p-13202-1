<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container form-container">
    <div class="card card-custom p-4">
        <h1 class="page-title" th:text="${article.title}"></h1>

        <div class="border rounded p-3 mb-4 bg-white">
            <p class="mb-0" th:text="${article.content}"></p>
        </div>

        <a th:href="@{/article/modify/{id}(id=${article.id})}" class="btn btn-secondary btn-custom mb-2">수정
        </a>

        <a th:href="@{/article/delete/{id}(id=${article.id})}" class="btn btn-secondary btn-custom mb-2">삭제
        </a>

        <a href="/article/list" class="btn btn-secondary btn-custom">목록</a>
    </div>
</div>

</body>
</html>
