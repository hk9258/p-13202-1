<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 리스트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container container-box">
    <div class="card card-custom p-4">
        <h1 class="page-title">게시글 리스트</h1>

        <div class="text-end mb-3">
            <a href="/article/create" class="btn btn-primary">등록</a>
        </div>

        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>생성일</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="article : ${articleList}">
                <td th:text="${article.id}"></td>

                <td>
                    <a th:href="@{/article/detail/{id}(id=${article.id})}"
                       th:text="${article.title}"
                       class="text-decoration-none">
                    </a>
                </td>

                <td th:text="${article.author != null ? article.author.username : '작성자 없음'}"></td>

                <td th:text="${#temporals.format(article.createdDate, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
